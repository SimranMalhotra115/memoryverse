{% extends 'base.html' %}{% block content %}<div class="page-head"><h1>✨ Your Projects</h1>
  <a class="btn" href="/create">+ {{ t('create') }}</a>
</div><div class="grid">
  {% for e in events %}
  <div class="card">
    <h2>{{ e.title }}</h2>
    <p>{{ e.event_type }} • {{ e.receiver_name }}</p>
    <p>Status: {{ e.status }}</p><div class="actions">
      <a class="btn small" href="/edit/{{ e.id }}">Edit</a><a class="btn small" href="/memories/{{ e.id }}">Memories</a>
      <a class="btn small" href="/publish/{{ e.id }}">Publish</a>
      <a class="btn small" href="/share/{{ e.id }}">Share</a><a class="btn small" target="_blank" href="/s/{{ e.slug }}">Preview</a></div></div>{% else %}<div class="card">No project yet.</div>{% endfor %}</div>{% endblock %}
