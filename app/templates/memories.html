{% extends 'base.html' %}{% block content %}<div class="page-head"><h1>Add Memories</h1><a class="btn" href="/publish/{{ event.id }}">Publish</a></div><div class="form-card wide"><form method="post" enctype="multipart/form-data"><input name="title" placeholder="Memory title" required><textarea name="description" placeholder="Memory description"></textarea><select name="emotion_tag"><option>love</option><option>funny</option><option>proud</option><option>thankful</option></select><input type="file" name="media"><button class="btn">Add Memory</button></form></div><div class="grid">{% for m in memories %}<div class="card"><h3>{{ m.title }}</h3><p>{{ m.description }}</p>{% if m.media_url and m.media_type=='image' %}<img class="media" src="{{ m.media_url }}">{% endif %}</div>{% endfor %}</div>{% endblock %}
