{% extends 'base.html' %}{% block content %}<div class="form-card wide"><h1>{{ t('create') }}</h1><form method="post"><select name="event_type"><option>birthday</option><option>anniversary</option><option>friendship</option><option>long_distance</option><option>mothers_day</option><option>memorial</option></select><input name="title" placeholder="Title" value="{{ event.title if event else '' }}" required><input name="receiver_name" placeholder="Receiver name" value="{{ event.receiver_name if event else '' }}" required><input name="subtitle" placeholder="Subtitle" value="{{ event.subtitle if event else '' }}"><textarea name="final_message" placeholder="Final message">{{ event.final_message if event else '' }}</textarea><select name="language"><option value="en">English</option><option value="hi">हिंदी</option></select><select name="appearance"><option value="dark">Dark</option><option value="light">Light</option></select><button class="btn full">Save</button></form></div>{% endblock %}
